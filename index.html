<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IM SORRY PRINCESS</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: 'Comic Sans MS', 'Chalkboard SE', 'Marker Felt', cursive, sans-serif;
    background-color: #fff0f5;
    background-image: radial-gradient(#ffd1dc 3px, transparent 3px);
    background-size: 30px 30px;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
  }

  .container {
    background: white;
    max-width: 600px;
    width: 100%;
    padding: 50px 30px;
    border-radius: 25px;
    border: 3px solid #ffe4e8;
    box-shadow: 0 10px 20px rgba(255, 182, 193, 0.2);
    text-align: center;
  }

  h1 {
    color: #ff6f91;
    font-size: clamp(1.8rem, 4vw, 2.5rem);
    margin-bottom: 10px;
    line-height: 1.3;
    text-shadow: 2px 2px 4px rgba(255, 111, 145, 0.2);
  }

  h2 {
    color: #ff8fa3;
    font-size: 1.2rem;
    font-weight: bold;
    margin-bottom: 40px;
  }

  .button-group {
    display: flex;
    flex-direction: column;
    gap: 15px;
    align-items: center;
  }

  button {
    width: 100%;
    max-width: 250px;
    padding: 15px 20px;
    border: none;
    border-radius: 50px;
    background: linear-gradient(135deg, #ffb6c1, #ff9aab);
    color: white;
    font-size: 18px;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 5px 15px rgba(255, 154, 171, 0.4);
    transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }

  button:hover {
    transform: translateY(-5px) scale(1.05);
    box-shadow: 0 8px 20px rgba(255, 154, 171, 0.6);
  }
</style>
</head>
<body>
  <div class="container">
    <h1>I OWE YOU AN HONEST APOLOGY</h1>
    <h2>No excuse. just the truth</h2>
    <div class="button-group">
      <button type="button" onclick="window.location.href='read my heart.html'">Read My heart</button>
      <button type="button" onclick="window.location.href='love letter.html'">Love Letter</button>
      <button type="button" onclick="window.location.href='our memories.html'">Our Memories</button>
    </div>
  </div>
</body>
</html>
