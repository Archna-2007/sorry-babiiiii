<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Open When...</title>

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: 'Comic Sans MS', 'Chalkboard SE', 'Marker Felt', cursive, sans-serif;
    background-color: #fff0f5;
    background-image: radial-gradient(#ffd1dc 3px, transparent 3px);
    background-size: 30px 30px;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
  }

  .cute-nav {
    display: flex;
    justify-content: center;
    gap: 15px;
    margin-bottom: 40px;
    flex-wrap: wrap;
    padding: 0 20px;
    margin-top: 20px;
  }

  .nav-btn {
    text-decoration: none;
    padding: 12px 25px;
    background-color: white;
    color: #ff6f91;
    border: 3px solid #ffe4e8;
    border-radius: 30px;
    font-weight: bold;
    font-size: 1.1rem;
    transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    box-shadow: 0 4px 10px rgba(255, 182, 193, 0.2);
  }

  .nav-btn:hover {
    transform: translateY(-3px) scale(1.05);
    box-shadow: 0 8px 15px rgba(255, 182, 193, 0.4);
    background-color: #fff0f5;
  }

  .nav-btn.active {
    background: linear-gradient(135deg, #ffb6c1, #ff9aab);
    color: white;
    border-color: transparent;
    box-shadow: 0 5px 15px rgba(255, 154, 171, 0.4);
  }

  .container {
    background: white;
    width: 100%;
    max-width: 700px;
    padding: 40px;
    border-radius: 10px;
    border: 2px solid #ffe4e8;
    box-shadow: 0 10px 20px rgba(255, 182, 193, 0.3);
  }

  h1 {
    text-align: center;
    color: #ff6f91;
    margin-bottom: 30px;
    font-size: 2rem;
  }

  .categories {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
    margin-bottom: 40px;
  }

  .category-btn {
    padding: 15px;
    background-color: #ffe4e8;
    border: 2px solid #ffb6c1;
    border-radius: 10px;
    color: #ff6f91;
    font-weight: bold;
    font-size: 1rem;
    cursor: pointer;
    transition: all 0.3s ease;
    font-family: 'Comic Sans MS', cursive;
  }

  .category-btn:hover {
    background-color: #ffb6c1;
    transform: scale(1.05);
    box-shadow: 0 4px 8px rgba(255, 182, 193, 0.3);
  }

  .category-btn.active {
    background: linear-gradient(135deg, #ffb6c1, #ff9aab);
    color: white;
    border-color: #ff9aab;
  }

  .quote-box {
    display: none;
    text-align: center;
    padding: 30px;
    background: linear-gradient(135deg, #fff0f5, #ffe4e8);
    border-radius: 10px;
    border: 2px solid #ffb6c1;
    min-height: 150px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .quote-box.active {
    display: flex;
  }

  .quote-text {
    font-size: 1.3rem;
    color: #ff6f91;
    line-height: 1.8;
    margin-bottom: 20px;
    font-style: italic;
  }

  .new-quote-btn {
    background: linear-gradient(135deg, #ffb6c1, #ff9aab);
    color: white;
    border: none;
    padding: 12px 30px;
    border-radius: 25px;
    font-weight: bold;
    font-size: 1rem;
    cursor: pointer;
    transition: all 0.3s ease;
    align-self: center;
    font-family: 'Comic Sans MS', cursive;
    margin-top: 15px;
  }

  .new-quote-btn:hover {
    transform: scale(1.05);
    box-shadow: 0 4px 12px rgba(255, 154, 171, 0.4);
  }

  .category-title {
    text-align: center;
    color: #ff6f91;
    font-size: 1.5rem;
    margin-bottom: 20px;
  }
</style>
</head>
<body>

<nav class="cute-nav">
  <a href="index.html" class="nav-btn">🏠 Home</a>
  <a href="read my heart.html" class="nav-btn">💌 Read My Heart</a>
  <a href="love letter.html" class="nav-btn">📝 Love Letter</a>
  <a href="our memories.html" class="nav-btn">📸 Memories</a>
  <a href="open when.html" class="nav-btn active">💝 Open When</a>
  <a href="feedback.html" class="nav-btn">💬 Feedback</a>
</nav>

<div class="container">
  <h1>Open When...</h1>
  
  <div class="categories">
    <button class="category-btn" onclick="selectCategory(0)">❤️ Reasons I Love You</button>

    <button class="category-btn" onclick="selectCategory(2)">💔 You Miss Me</button>
    <button class="category-btn" onclick="selectCategory(3)">🌀 Overthinking</button>
    <button class="category-btn" onclick="selectCategory(4)">🤍 You Need Love</button>
    <button class="category-btn" onclick="selectCategory(5)">💪 Need Confidence</button>
    <button class="category-btn" onclick="selectCategory(6)">☮️ You Need Peace</button>
    <button class="category-btn" onclick="selectCategory(7)">⚡ We Fight</button>
  </div>

  <div id="quote-container">
    <div class="quote-box active">
      <p class="quote-text">Select how you're feeling and I'll give you a message just for you 💕</p>
    </div>
  </div>
</div>

    "You are loved without conditions.",

const categoryNames = [
  "Reasons I Love You",
  "When You're Sad",
  "When You Miss Me",
  "When You're Overthinking",
  "When You Need Love",
  "When You Need Confidence",
  "When You Need Peace",
  "When We Fight"
];

let currentCategory = -1;

function selectCategory(index) {
  currentCategory = index;
  
  // Update button styles
  document.querySelectorAll('.category-btn').forEach((btn, i) => {
    btn.classList.toggle('active', i === index);
  });
  
  showRandomQuote();
}

function showRandomQuote() {
  if (currentCategory === -1) return;
  
  const categoryQuotes = quotes[currentCategory];
  const randomQuote = categoryQuotes[Math.floor(Math.random() * categoryQuotes.length)];
  
  const quoteContainer = document.getElementById('quote-container');
  quoteContainer.innerHTML = `
    <div class="quote-box active">
      <div class="category-title">${categoryNames[currentCategory]}</div>
      <p class="quote-text">"${randomQuote}"</p>
      <button class="new-quote-btn" onclick="showRandomQuote()">✨ Another One</button>
    </div>
  `;
}
</script>

</body>
</html>
